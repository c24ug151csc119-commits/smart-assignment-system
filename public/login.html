<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Smart Summit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-side">
      <div class="brand">Smart<span>Summit</span></div>
      <p>One place for your college to post assignments, submit work, and track every mark — without a single lost paper.</p>
    </div>
    <div class="auth-form-panel">
      <div class="container">
        <h2>Welcome back</h2>
        <p class="sub">Log in to your account to continue.</p>
        <form id="loginForm">
          <label>Email</label>
          <input type="email" id="email" required>

          <label>Password</label>
          <input type="password" id="password" required>

          <button type="submit">Log In</button>
        </form>
        <p id="message"></p>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
